<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Floral Orb</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0D0D0D;
      font-family: system-ui, sans-serif;
    }
    canvas { display: block; width: 100%; height: 100%; cursor: grab; }
    canvas:active { cursor: grabbing; }
    .ui {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 10;
    }
    .ui button {
      padding: 10px 22px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 999px;
      background: rgba(20, 20, 20, 0.85);
      color: rgba(255, 255, 255, 0.85);
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .ui button:hover {
      background: rgba(40, 40, 40, 0.9);
      border-color: rgba(255, 255, 255, 0.3);
    }
    .ui button.active {
      color: #fff;
    }
    .ui button.active[data-palette="0"] {
      background: rgba(60, 40, 90, 0.9);
      border-color: rgba(180, 120, 255, 0.5);
    }
    .ui button.active[data-palette="1"] {
      background: rgba(70, 72, 80, 0.9);
      border-color: rgba(180, 185, 195, 0.55);
    }
    .ui button.active[data-palette="2"] {
      background: rgba(90, 35, 55, 0.9);
      border-color: rgba(255, 140, 180, 0.55);
    }
    .ui button.active[data-palette="3"] {
      background: rgba(30, 70, 45, 0.9);
      border-color: rgba(120, 220, 150, 0.55);
    }
  </style>
</head>
<body>
  <div class="ui">
    <button id="btn-purple" class="active" data-palette="0">Purple</button>
    <button id="btn-silver" data-palette="1">Silver</button>
    <button id="btn-pink" data-palette="2">Pink</button>
    <button id="btn-green" data-palette="3">Green</button>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';

    const NOISE_GLSL = /* glsl */`
      vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
      vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
      vec4 permute(vec4 x) { return mod289(((x * 34.0) + 1.0) * x); }
      vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.853735429615513 * r; }

      float snoise(vec3 v) {
        const vec2 C = vec2(1.0 / 6.0, 1.0 / 3.0);
        const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
        vec3 i = floor(v + dot(v, C.yyy));
        vec3 x0 = v - i + dot(i, C.xxx);
        vec3 g = step(x0.yzx, x0.xyz);
        vec3 l = 1.0 - g;
        vec3 i1 = min(g.xyz, l.zxy);
        vec3 i2 = max(g.xyz, l.zxy);
        vec3 x1 = x0 - i1 + C.xxx;
        vec3 x2 = x0 - i2 + C.yyy;
        vec3 x3 = x0 - D.yyy;
        i = mod289(i);
        vec4 p = permute(permute(permute(
          i.z + vec4(0.0, i1.z, i2.z, 1.0))
          + i.y + vec4(0.0, i1.y, i2.y, 1.0))
          + i.x + vec4(0.0, i1.x, i2.x, 1.0));
        float n_ = 0.142857142857;
        vec3 ns = n_ * D.wyz - D.xzx;
        vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
        vec4 x_ = floor(j * ns.z);
        vec4 y_ = floor(j - 7.0 * x_);
        vec4 x = x_ * ns.x + ns.yyyy;
        vec4 y = y_ * ns.x + ns.yyyy;
        vec4 h = 1.0 - abs(x) - abs(y);
        vec4 b0 = vec4(x.xy, y.xy);
        vec4 b1 = vec4(x.zw, y.zw);
        vec4 s0 = floor(b0) * 2.0 + 1.0;
        vec4 s1 = floor(b1) * 2.0 + 1.0;
        vec4 sh = -step(h, vec4(0.0));
        vec4 a0 = b0.xzyw + s0.xzyw * sh.xxyy;
        vec4 a1 = b1.xzyw + s1.xzyw * sh.zzww;
        vec3 p0 = vec3(a0.xy, h.x);
        vec3 p1 = vec3(a0.zw, h.y);
        vec3 p2 = vec3(a1.xy, h.z);
        vec3 p3 = vec3(a1.zw, h.w);
        vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
        p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
        vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
        m = m * m;
        return 42.0 * dot(m * m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
      }

      float fbm(vec3 p) {
        float v = 0.0;
        float a = 0.5;
        for (int i = 0; i < 3; i++) {
          v += a * snoise(p);
          p = p * 2.02 + vec3(1.7, 1.2, 2.3);
          a *= 0.5;
        }
        return v;
      }

      float ridged(vec3 p) {
        float n = 1.0 - abs(snoise(p));
        return n * n;
      }

      float smoothFbm(vec3 p) {
        return snoise(p) * 0.55 + snoise(p * 1.35 + vec3(1.7, 2.3, 0.9)) * 0.45;
      }

      vec3 warp(vec3 p, float t) {
        vec3 q = p;
        q += vec3(
          snoise(q * 0.7 + vec3(t * 0.09, 0.0, -t * 0.06)),
          snoise(q * 0.7 + vec3(4.2, t * 0.07, 1.3)),
          snoise(q * 0.7 + vec3(1.7, 3.1, t * 0.08))
        ) * 0.45;
        return q;
      }

      // big soft smoky folds (low frequency)
      float smokeFold(vec3 p, float t) {
        vec3 q = warp(p * 0.85, t);
        float s = snoise(q + vec3(t * 0.08, -t * 0.06, t * 0.05)) * 0.65;
        s += snoise(q * 1.8 + vec3(-t * 0.05, t * 0.06, 2.4)) * 0.35;
        return s;
      }

      // sparse large caustic ribbons: raw value 0..1
      float ribbonRaw(vec3 p, float t) {
        vec3 q = warp(p * 1.05, t);
        float r1 = ridged(q * 1.25 + vec3(t * 0.07, t * 0.055, -t * 0.05));
        float r2 = ridged(q * 1.85 + vec3(2.3, -t * 0.06, t * 0.07));
        return max(r1, r2 * 0.75);
      }

      float shellDisp(vec3 dir, float t) {
        float d = smoothFbm(dir * 0.72 + vec3(t * 0.08, t * 0.06, -t * 0.07)) * 0.11;
        d += snoise(dir * 1.3 + vec3(-t * 0.05, t * 0.06, t * 0.04)) * 0.03;
        return d;
      }
    `;

    const vertexShader = /* glsl */`
      uniform float uTime;
      varying vec3 vWorldPos;
      varying vec3 vNormal;
      varying vec3 vLocal;

      ${NOISE_GLSL}

      void main() {
        vec3 dir = normalize(position);
        vec3 local = dir * (1.0 + shellDisp(dir, uTime));
        vLocal = local;
        vec4 world = modelMatrix * vec4(local, 1.0);
        vWorldPos = world.xyz;

        float e = 0.03;
        vec3 t1 = normalize(dir + vec3(e, 0.0, 0.0));
        vec3 t2 = normalize(dir + vec3(0.0, e, 0.0));
        vec3 p1 = t1 * (1.0 + shellDisp(t1, uTime));
        vec3 p2 = t2 * (1.0 + shellDisp(t2, uTime));
        vNormal = normalize(normalMatrix * normalize(cross(p1 - local, p2 - local)));

        gl_Position = projectionMatrix * viewMatrix * world;
      }
    `;

    const fragmentShader = /* glsl */`
      uniform float uTime;
      uniform int uPalette;
      uniform vec3 uCameraLocal;

      varying vec3 vWorldPos;
      varying vec3 vNormal;
      varying vec3 vLocal;

      ${NOISE_GLSL}

      float cloudDensity(vec3 p, float t) {
        vec3 q = warp(p * 0.95, t);
        float r1 = ridged(q * 0.95 + vec3(t * 0.055, -t * 0.04, t * 0.035));
        float r2 = ridged(q * 1.35 + vec3(2.1, t * 0.045, -t * 0.05));
        float d = max(r1, r2 * 0.72);
        d = smoothstep(0.35, 0.85, d);
        float mask = snoise(p * 0.48 + vec3(t * 0.05, -t * 0.04, t * 0.035) + 5.1);
        d *= smoothstep(-0.25, 0.35, mask);
        return d;
      }

      void main() {
        vec3 viewDir = normalize(cameraPosition - vWorldPos);
        vec3 n = normalize(vNormal);
        float t = uTime;
        float ndv = max(dot(n, viewDir), 0.0);
        float fresnel = pow(1.0 - ndv, 2.0);

        vec3 voidTone, bodyTone, paleTone, hotTone;
        if (uPalette == 0) {
          // purple / mauve
          voidTone = vec3(0.42, 0.30, 0.38);
          bodyTone = vec3(0.74, 0.58, 0.66);
          paleTone = vec3(0.94, 0.86, 0.89);
          hotTone  = vec3(1.0, 0.96, 0.97);
        } else if (uPalette == 1) {
          // silver
          voidTone = vec3(0.32, 0.33, 0.38);
          bodyTone = vec3(0.62, 0.64, 0.70);
          paleTone = vec3(0.92, 0.93, 0.96);
          hotTone  = vec3(1.0);
        } else if (uPalette == 2) {
          // pink / blossom
          voidTone = vec3(0.40, 0.22, 0.30);
          bodyTone = vec3(0.86, 0.55, 0.68);
          paleTone = vec3(0.98, 0.88, 0.92);
          hotTone  = vec3(1.0, 0.96, 0.98);
        } else {
          // green / soft jade
          voidTone = vec3(0.20, 0.32, 0.26);
          bodyTone = vec3(0.48, 0.72, 0.58);
          paleTone = vec3(0.86, 0.96, 0.90);
          hotTone  = vec3(0.96, 1.0, 0.97);
        }

        vec3 localView = normalize(uCameraLocal - vLocal);

        vec3 accum = vec3(0.0);
        float densSum = 0.0;
        float hotSum = 0.0;
        float wsum = 0.0;

        for (int i = 0; i < 6; i++) {
          float depth = float(i) / 5.0;
          vec3 sp = vLocal - localView * depth * 0.9;
          float ri = length(sp);
          float inside = 1.0 - smoothstep(0.70, 0.98, ri);

          float cluster = 1.0 - smoothstep(0.58, 0.92, ri);
          float d = cloudDensity(sp, t) * cluster;

          float body = smoothstep(0.04, 0.5, d);
          float core = smoothstep(0.4, 0.9, d);
          float shade = 0.85 + 0.2 * snoise(sp * 1.2 + vec3(t * 0.08, -t * 0.06, 1.4));

          vec3 layerCol = voidTone * 0.85;
          layerCol = mix(layerCol, bodyTone * shade, body);
          layerCol = mix(layerCol, paleTone, core * 0.75);
          layerCol = mix(layerCol, hotTone, core * core);

          float w = inside * (0.4 + body * 0.7) * (1.0 - depth * 0.2);
          accum += layerCol * w;
          wsum += w;
          densSum += body * inside;
          hotSum += core * inside * (1.0 - depth * 0.25);
        }

        vec3 col = accum / max(wsum, 0.001);

        hotSum = min(hotSum, 2.0);
        float bloom = 1.0 - exp(-hotSum * 0.55);
        col = mix(col, hotTone, bloom * 0.5);
        col += hotTone * bloom * bloom * bloom * 0.22;

        vec3 frost = mix(paleTone, vec3(0.88, 0.88, 0.91), 0.4);
        float shellGlow = fresnel * fresnel * 0.75 + fresnel * 0.4;
        float rimVar = 0.75 + 0.25 * snoise(normalize(vLocal) * 1.8 + vec3(t * 0.03, 0.0, 0.0));
        col += frost * shellGlow * rimVar;

        col = max(col, voidTone * 0.7);

        float outAlpha = 0.55 + densSum * 0.18 + bloom * 0.16 + fresnel * 0.35;
        gl_FragColor = vec4(col, clamp(outAlpha, 0.35, 0.96));
      }
    `;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0D0D0D);

    const camera = new THREE.PerspectiveCamera(42, innerWidth / innerHeight, 0.1, 100);
    camera.position.set(0, 0, 3.1);

    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      powerPreference: 'low-power',
      preserveDrawingBuffer: true,
    });
    renderer.setPixelRatio(1);
    renderer.setSize(innerWidth, innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.15;
    document.body.appendChild(renderer.domElement);

    const blobGroup = new THREE.Group();
    scene.add(blobGroup);

    const uniforms = {
      uTime: { value: 0 },
      uPalette: { value: 0 },
      uCameraLocal: { value: new THREE.Vector3() },
    };

    const material = new THREE.ShaderMaterial({
      vertexShader,
      fragmentShader,
      uniforms,
      transparent: true,
      depthWrite: false,
      side: THREE.FrontSide,
    });
    blobGroup.add(new THREE.Mesh(new THREE.SphereGeometry(1, 96, 72), material));
    renderer.debug.checkShaderErrors = true;

    const cameraLocal = new THREE.Vector3();
    let isDragging = false;
    let prevX = 0;
    let prevY = 0;
    let rotX = 0.15;
    let rotY = 0;
    const canvas = renderer.domElement;

    canvas.addEventListener('pointerdown', (e) => {
      isDragging = true;
      prevX = e.clientX;
      prevY = e.clientY;
      canvas.setPointerCapture(e.pointerId);
    });
    canvas.addEventListener('pointerup', (e) => {
      isDragging = false;
      canvas.releasePointerCapture(e.pointerId);
    });
    canvas.addEventListener('pointercancel', () => { isDragging = false; });
    canvas.addEventListener('pointermove', (e) => {
      if (!isDragging) return;
      rotY += (e.clientX - prevX) * 0.009;
      rotX += (e.clientY - prevY) * 0.009;
      rotX = THREE.MathUtils.clamp(rotX, -1.2, 1.2);
      blobGroup.rotation.set(rotX, rotY, 0);
      prevX = e.clientX;
      prevY = e.clientY;
    });

    const paletteButtons = [
      document.getElementById('btn-purple'),
      document.getElementById('btn-silver'),
      document.getElementById('btn-pink'),
      document.getElementById('btn-green'),
    ];

    function setPalette(mode) {
      uniforms.uPalette.value = mode;
      paletteButtons.forEach((btn, i) => {
        btn.classList.toggle('active', i === mode);
      });
    }

    paletteButtons.forEach((btn, i) => {
      btn.addEventListener('click', () => setPalette(i));
    });
    window.addEventListener('keydown', (e) => {
      if (e.key === '1' || e.key === 'p' || e.key === 'P') setPalette(0);
      if (e.key === '2' || e.key === 's' || e.key === 'S') setPalette(1);
      if (e.key === '3' || e.key === 'k' || e.key === 'K') setPalette(2);
      if (e.key === '4' || e.key === 'g' || e.key === 'G') setPalette(3);
    });

    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const et = clock.getElapsedTime();
      uniforms.uTime.value = et * 1.7;
      if (!isDragging) {
        rotY += 0.0012;
        blobGroup.rotation.set(rotX, rotY, 0);
      }
      cameraLocal.copy(camera.position);
      blobGroup.worldToLocal(cameraLocal);
      uniforms.uCameraLocal.value.copy(cameraLocal);
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
